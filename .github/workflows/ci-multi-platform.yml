name: ci-multi-platform

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  native-build-and-test:
    name: native-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-gcc
            os: ubuntu-24.04
            cc: gcc
            cxx: g++
          - name: ubuntu-clang
            os: ubuntu-24.04
            cc: clang
            cxx: clang++
          - name: macos-clang
            os: macos-14
            cc: clang
            cxx: clang++
          - name: windows-msvc
            os: windows-2022
            cc: cl
            cxx: cl

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Ninja + Release)
        shell: pwsh
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release -j

      - name: CTest smoke
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure -C Release --timeout 240

      - name: Run expr quick with explicit options
        shell: pwsh
        run: |
          $bin = if (Test-Path "./build/expr_method_bench.exe") { "./build/expr_method_bench.exe" } else { "./build/expr_method_bench" }
          & $bin --preset quick --case expr_chunkpipe_64k_f64 --seed 42 --threads 2 `
            --warmup 2 --iterations 12 --target-ms 80 --max-repeat 48 `
            --randomize-order --pin-cpu --high-priority `
            --csv expr_quick_${{ matrix.name }}.csv

      - name: Upload quick csv
        uses: actions/upload-artifact@v5
        with:
          name: expr-quick-${{ matrix.name }}
          path: expr_quick_${{ matrix.name }}.csv

  cross-compile-linux-arm64:
    name: cross-linux-aarch64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-aarch64-linux-gnu

      - name: Configure (aarch64)
        run: |
          cmake -S . -B build-aarch64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

      - name: Build (aarch64)
        run: |
          cmake --build build-aarch64 -j

      - name: Verify target machine
        run: |
          aarch64-linux-gnu-readelf -h build-aarch64/expr_method_bench | grep "Machine"

  cross-compile-windows-arm64:
    name: cross-windows-arm64
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure (VS2022 ARM64)
        shell: pwsh
        run: |
          cmake -S . -B build-arm64 -G "Visual Studio 17 2022" -A ARM64 -DBUILD_TESTING=ON

      - name: Build (ARM64 Release)
        shell: pwsh
        run: |
          cmake --build build-arm64 --config Release --target expr_method_bench chunk_bench expr_unit_tests

      - name: List ARM64 binaries
        shell: pwsh
        run: |
          Get-ChildItem -Path build-arm64 -Recurse -Filter *.exe | Select-Object FullName,Length

  cross-compile-macos-universal:
    name: cross-macos-universal
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure (x86_64 + arm64)
        run: |
          cmake -S . -B build-universal -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DBUILD_TESTING=ON

      - name: Build (universal)
        run: |
          cmake --build build-universal -j

      - name: Verify universal binary
        run: |
          lipo -info build-universal/expr_method_bench
